name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: windows-latest   # named pipe & ConPTY = target produksi; jangan ganti ubuntu
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
